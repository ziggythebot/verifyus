<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VerifyUS Widget Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .widget-container {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 30px;
    }

    .controls {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 30px;
    }

    .controls h2 {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button:hover {
      background: #5568d3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .status h2 {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #333;
    }

    .status-log {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    .status-item {
      margin-bottom: 8px;
      padding: 8px;
      border-radius: 4px;
    }

    .status-item.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status-item.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-item.info {
      background: #dbeafe;
      color: #1e40af;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 2rem;
      }

      .widget-container,
      .controls,
      .status {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔐 VerifyUS Widget Demo</h1>
      <p>Test the embeddable verification widget</p>
    </div>

    <div class="controls">
      <h2>Widget Controls</h2>

      <div class="form-group">
        <label for="walletAddress">Wallet Address (Optional)</label>
        <input
          type="text"
          id="walletAddress"
          placeholder="0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb"
          value=""
        >
      </div>

      <div>
        <button id="initWidget">Initialize Widget</button>
        <button id="updateWallet">Update Wallet Address</button>
        <button id="destroyWidget">Destroy Widget</button>
        <button id="clearLog">Clear Log</button>
      </div>
    </div>

    <div class="widget-container">
      <div id="verifyus-widget"></div>
    </div>

    <div class="status">
      <h2>Status Log</h2>
      <div id="statusLog" class="status-log">
        <div class="status-item info">Waiting for widget initialization...</div>
      </div>
    </div>
  </div>

  <!-- Load the VerifyUS widget script -->
  <script src="/widget.js"></script>

  <!-- Demo application logic -->
  <script>
    let widget = null;

    // Log helper
    function log(message, type = 'info') {
      const logEl = document.getElementById('statusLog');
      const time = new Date().toLocaleTimeString();
      const statusItem = document.createElement('div');
      statusItem.className = `status-item ${type}`;
      statusItem.textContent = `[${time}] ${message}`;
      logEl.insertBefore(statusItem, logEl.firstChild);
    }

    // Initialize widget
    document.getElementById('initWidget').addEventListener('click', function() {
      if (widget) {
        log('Widget already initialized', 'error');
        return;
      }

      const walletAddress = document.getElementById('walletAddress').value || null;

      log('Initializing widget...', 'info');

      widget = VerifyUS.init({
        containerId: 'verifyus-widget',
        walletAddress: walletAddress,
        width: '100%',
        height: '600px',
        onVerificationComplete: function(result) {
          log('✓ Verification completed successfully!', 'success');
          log('Result: ' + JSON.stringify(result, null, 2), 'success');
          console.log('Full verification result:', result);
        },
        onVerificationError: function(error) {
          log('✗ Verification failed: ' + error.message, 'error');
          console.error('Verification error:', error);
        }
      });

      log('Widget initialized (v' + VerifyUS.version + ')', 'success');
    });

    // Update wallet address
    document.getElementById('updateWallet').addEventListener('click', function() {
      if (!widget) {
        log('Initialize widget first', 'error');
        return;
      }

      const walletAddress = document.getElementById('walletAddress').value;
      if (!walletAddress) {
        log('Enter a wallet address first', 'error');
        return;
      }

      widget.setWalletAddress(walletAddress);
      log('Wallet address updated to: ' + walletAddress, 'success');
    });

    // Destroy widget
    document.getElementById('destroyWidget').addEventListener('click', function() {
      if (!widget) {
        log('No widget to destroy', 'error');
        return;
      }

      widget.destroy();
      widget = null;
      log('Widget destroyed', 'info');
    });

    // Clear log
    document.getElementById('clearLog').addEventListener('click', function() {
      document.getElementById('statusLog').innerHTML = '';
      log('Log cleared', 'info');
    });

    // Auto-initialize on page load
    window.addEventListener('load', function() {
      log('Page loaded. Click "Initialize Widget" to start.', 'info');
      log('Widget script version: ' + VerifyUS.version, 'info');
    });
  </script>
</body>
</html>
